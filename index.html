<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcado / Feira</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #7c3aed;
    --accent2: #a78bfa;
    --text: #eef0f8;
    --muted: #6b7094;
    --border: #2e3250;
    --danger: #f55a7a;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 120px 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .total-pill {
    background: var(--accent);
    color: #0f1117;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 6px 14px;
    border-radius: 50px;
    transition: all 0.3s;
  }

  .progress-bar {
    margin-top: 12px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }

  main {
    padding: 20px 16px 0;
    max-width: 520px;
    margin: 0 auto;
  }

  /* PASTE SCREEN */
  #paste-screen {
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: fadeIn 0.3s ease;
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    min-height: 200px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    padding: 16px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .btn-primary {
    background: var(--accent);
    color: #0f1117;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    width: 100%;
  }

  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

  /* LIST SCREEN */
  #list-screen {
    display: none;
    flex-direction: column;
    gap: 10px;
    animation: fadeIn 0.3s ease;
  }

  /* ADD EXTRA ITEM */
  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }

  .add-row input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-row input:focus { border-color: var(--accent); }
  .add-row input::placeholder { color: var(--muted); }

  .btn-add {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--accent);
    font-size: 22px;
    width: 48px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .btn-add:active { background: var(--border); }

  /* ITEM CARD */
  .item-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 12px 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.2s, opacity 0.3s;
    animation: slideIn 0.25s ease;
  }

  .item-card.checked { opacity: 0.45; border-color: transparent; }
  .item-card.checked .item-name { text-decoration: line-through; color: var(--muted); }
  .item-card.extra { border-color: var(--accent2); border-style: dashed; }

  .card-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Checkbox */
  .check-btn {
    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 13px;
  }

  .check-btn.done {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f1117;
  }

  .item-name {
    flex: 1;
    font-size: 15px;
    font-weight: 400;
    line-height: 1.3;
    min-width: 0;
    word-break: break-word;
  }

  .del-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .del-btn:hover { color: var(--danger); }

  /* CARD BOTTOM — qty + price */
  .card-bottom {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 34px; /* align under item name */
  }

  .field-group {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .field-label {
    font-size: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .qty-input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 6px 8px;
    width: 52px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .qty-input:focus { border-color: var(--accent2); }
  .qty-input.has-value { color: var(--accent2); }

  .price-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .price-symbol {
    font-size: 12px;
    color: var(--muted);
  }

  .price-input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 6px 8px;
    width: 80px;
    text-align: right;
    outline: none;
    transition: border-color 0.2s;
  }

  .price-input:focus { border-color: var(--accent); }
  .price-input::placeholder { color: var(--muted); font-weight: 400; font-family: 'DM Sans', sans-serif; font-size: 12px; }
  .price-input.has-value { color: var(--accent); border-color: var(--surface2); }

  /* subtotal badge */
  .subtotal {
    margin-left: auto;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    white-space: nowrap;
    transition: color 0.2s;
  }

  .subtotal.active { color: var(--accent); }

  /* multiply sign */
  .times-sign {
    font-size: 11px;
    color: var(--muted);
  }

  /* DIVIDERS */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 6px 0 2px;
  }

  .divider span {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 520px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }

  .total-info { display: flex; flex-direction: column; gap: 2px; }

  .total-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .total-value {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    transition: all 0.3s;
  }

  .total-counted { font-size: 11px; color: var(--muted); }

  .btn-reset {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-reset:hover { border-color: var(--danger); color: var(--danger); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .empty-hint {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  .empty-hint .icon { font-size: 36px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🛒 Mercado / Feira </h1>
    <div class="total-pill" id="header-total">R$ 0,00</div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="progress-label" id="progress-label">0 de 0 itens marcados</div>
</header>

<main>

  <!-- PASTE SCREEN -->
  <div id="paste-screen">
    <div>
      <div class="section-label">Cole a lista do WhatsApp</div>
      <textarea id="paste-input" placeholder="Ex:
- Arroz 5kg
- Feijão
- Leite integral
- Frango
- Ovos (dúzia)

Cada item em uma linha ✓"></textarea>
    </div>
    <button class="btn-primary" onclick="importList()">Montar lista →</button>
  </div>

  <!-- LIST SCREEN -->
  <div id="list-screen">

    <div class="add-row">
      <input type="text" id="new-item-input" placeholder="Adicionar item extra..." onkeydown="if(event.key==='Enter') addExtraItem()" />
      <button class="btn-add" onclick="addExtraItem()">+</button>
    </div>

    <div id="list-label" class="divider"><span>Lista</span></div>
    <div id="items-container"></div>

    <div id="extra-label" class="divider" style="display:none"><span>Extras</span></div>
    <div id="extras-container"></div>

  </div>

</main>

<div class="bottom-bar" id="bottom-bar" style="display:none">
  <div class="total-info">
    <div class="total-label">Total</div>
    <div class="total-value" id="total-display">R$ 0,00</div>
    <div class="total-counted" id="items-counted">0 itens com preço</div>
  </div>
  <button class="btn-reset" onclick="resetAll()">Nova lista 🗑️</button>
</div>

<script>
  let items = [];
  let nextId = 1;

  function importList() {
    const raw = document.getElementById('paste-input').value.trim();
    if (!raw) return;

    const lines = raw
      .split('\n')
      .map(l => l.replace(/^[-•*✓✗\d+\.\)]+\s*/, '').trim())
      .filter(l => l.length > 0);

    if (lines.length === 0) return;

    items = lines.map(name => ({
      id: nextId++,
      name,
      qty: '',
      price: '',
      checked: false,
      extra: false
    }));

    showList();
  }

  function showList() {
    document.getElementById('paste-screen').style.display = 'none';
    document.getElementById('list-screen').style.display = 'flex';
    document.getElementById('bottom-bar').style.display = 'flex';
    renderItems();
  }

  function renderItems() {
    const container = document.getElementById('items-container');
    const extrasContainer = document.getElementById('extras-container');
    const extraLabel = document.getElementById('extra-label');

    const regular = items.filter(i => !i.extra);
    const extras = items.filter(i => i.extra);

    container.innerHTML = regular.length === 0
      ? '<div class="empty-hint"><div class="icon">📋</div>Lista vazia</div>'
      : regular.map(renderCard).join('');

    extrasContainer.innerHTML = extras.map(renderCard).join('');
    extraLabel.style.display = extras.length ? 'flex' : 'none';

    updateTotals();
  }

  function getSubtotal(item) {
    const price = parseFloat(item.price);
    if (isNaN(price) || item.price === '') return null;
    const qty = parseFloat(item.qty);
    const q = (!isNaN(qty) && item.qty !== '') ? qty : 1;
    return price * q;
  }

  function renderCard(item) {
    const hasPrice = item.price !== '' && !isNaN(parseFloat(item.price));
    const hasQty = item.qty !== '' && !isNaN(parseFloat(item.qty));
    const sub = getSubtotal(item);
    const subStr = sub !== null ? sub.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : '';
    const showSub = sub !== null && (hasQty || hasPrice);

    return `
      <div class="item-card ${item.checked ? 'checked' : ''} ${item.extra ? 'extra' : ''}" id="card-${item.id}">
        <div class="card-top">
          <button class="check-btn ${item.checked ? 'done' : ''}" onclick="toggleCheck(${item.id})">${item.checked ? '✓' : ''}</button>
          <span class="item-name">${item.name}</span>
          <button class="del-btn" onclick="deleteItem(${item.id})">✕</button>
        </div>
        <div class="card-bottom">
          <div class="field-group">
            <span class="field-label">Qtd</span>
            <input
              class="qty-input ${hasQty ? 'has-value' : ''}"
              type="number"
              inputmode="decimal"
              step="1"
              min="1"
              placeholder="1"
              value="${item.qty}"
              oninput="liveQty(${item.id}, this)"
            />
          </div>
          <span class="times-sign">×</span>
          <div class="field-group price-wrap">
            <span class="price-symbol">R$</span>
            <input
              class="price-input ${hasPrice ? 'has-value' : ''}"
              type="number"
              inputmode="decimal"
              step="0.01"
              min="0"
              placeholder="unit."
              value="${item.price}"
              oninput="livePrice(${item.id}, this)"
            />
          </div>
          <span class="subtotal ${showSub ? 'active' : ''}">${showSub ? '= ' + subStr : ''}</span>
        </div>
      </div>`;
  }

  function toggleCheck(id) {
    const item = items.find(i => i.id === id);
    if (item) item.checked = !item.checked;
    renderItems();
  }

  function liveQty(id, input) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    item.qty = input.value;
    input.classList.toggle('has-value', input.value !== '' && !isNaN(parseFloat(input.value)));
    // update subtotal in place
    const sub = getSubtotal(item);
    const card = document.getElementById('card-' + id);
    if (card) {
      const subEl = card.querySelector('.subtotal');
      if (subEl) {
        const subStr = sub !== null ? sub.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : '';
        subEl.textContent = sub !== null ? '= ' + subStr : '';
        subEl.classList.toggle('active', sub !== null);
      }
    }
    updateTotals();
  }

  function livePrice(id, input) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    item.price = input.value;
    input.classList.toggle('has-value', input.value !== '' && !isNaN(parseFloat(input.value)));
    const sub = getSubtotal(item);
    const card = document.getElementById('card-' + id);
    if (card) {
      const subEl = card.querySelector('.subtotal');
      if (subEl) {
        const subStr = sub !== null ? sub.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : '';
        subEl.textContent = sub !== null ? '= ' + subStr : '';
        subEl.classList.toggle('active', sub !== null);
      }
    }
    updateTotals();
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    renderItems();
  }

  function addExtraItem() {
    const input = document.getElementById('new-item-input');
    const name = input.value.trim();
    if (!name) return;
    items.push({ id: nextId++, name, qty: '', price: '', checked: false, extra: true });
    input.value = '';
    renderItems();
    setTimeout(() => {
      document.getElementById('extra-label').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }

  function updateTotals() {
    const priced = items.filter(i => i.checked && i.price !== '' && !isNaN(parseFloat(i.price)));
    const total = priced.reduce((sum, i) => sum + (getSubtotal(i) || 0), 0);
    const totalStr = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    document.getElementById('total-display').textContent = totalStr;
    document.getElementById('header-total').textContent = totalStr;
    document.getElementById('items-counted').textContent = `${priced.length} iten${priced.length !== 1 ? 's' : ''} com preço`;

    const checked = items.filter(i => i.checked).length;
    const total_items = items.length;
    const pct = total_items > 0 ? (checked / total_items) * 100 : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `${checked} de ${total_items} itens marcados`;
  }

  function resetAll() {
    if (!confirm('Começar uma nova lista? A lista atual será apagada.')) return;
    items = [];
    nextId = 1;
    document.getElementById('paste-input').value = '';
    document.getElementById('paste-screen').style.display = 'flex';
    document.getElementById('list-screen').style.display = 'none';
    document.getElementById('bottom-bar').style.display = 'none';
  }
</script>
</body>
</html>
